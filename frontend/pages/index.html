<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MaurMaket</title>
  <style>
    html,body{
      height:100%;
      margin:0;
      font-family:Segoe UI,Roboto,Arial,sans-serif;
      background:#F26900;
    }
    .splash{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    /* Logo container - static, no animations */
    .logo-container{
      width:220px;
      height:220px;
      max-width:60vw;
      max-height:60vw;
      border-radius:50%;
      background:transparent;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      opacity:1; /* Removed animation - always visible */
      position:relative;
      overflow:visible;
    }
    .logo{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform:scale(1.3);
      transform-origin:center center;
    }

    /* Exit animation applied to the logo container on click */
    .logo-exit {
      animation: logoExit 1.5s forwards ease-in-out;
    }

    @keyframes logoExit {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }

    /* Square frame that sits around the circular logo */
    .frame-square{
      width:256px;
      height:256px;
      max-width:66vw;
      max-height:66vw;
      display:flex;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
      background:transparent;
      border:8px solid #F26900;
      position:relative;
      border-radius:4px;
      cursor:pointer;
    }
    /* Top header logo - responsive and unobtrusive */
    .top-header{
      position:absolute;
      top:12px;
      left:0;
      right:0;
      display:flex;
      justify-content:center;
      pointer-events:auto;
      z-index:10;
    }
    .header-logo{
      height:48px;
      max-height:9vh;
      max-width:220px;
      width:auto;
      display:block;
      object-fit:contain;
    }
    .visually-hidden{
      position:absolute;
      left:-9999px;
    }
  </style>
</head>
<body aria-label="MaurMaket splash - click to enter">
    <header class="top-header">
    <a href="home.html" aria-label="MaurMaket home">
      <img src="https://i.ibb.co/3y6cPdkn/Logo-Without-name.png" alt="MaurMaket logo" class="header-logo">
    </a>
  </header>
  <div class="splash">
    <div class="frame-square">
      <div class="logo-container" id="splash-logo">
        <img src="https://i.ibb.co/3y6cPdkn/Logo-Without-name.png" alt="MaurMaket logo" class="logo">
      </div>
    </div>
  </div>
  <script>
    const logo = document.getElementById("splash-logo");
    if (logo) {
      logo.style.cursor = 'pointer';
      logo.addEventListener("click", () => {
        // disable further clicks
        logo.style.pointerEvents = 'none';
        // add exit animation class
        logo.classList.add("logo-exit");

        setTimeout(() => {
          // navigate after animation completes
          window.location.href = "home.html";
        }, 1500);
      });
    }
  </script>
</body>
</html>
