<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MaurMaket</title>
  <style>
    html,body{
      height:100%;
      margin:0;
      font-family:Segoe UI,Roboto,Arial,sans-serif;
      background:#F26900;
    }
    .splash{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    /* Logo container - static, no animations */
    .logo-container{
      width:220px;
      height:220px;
      max-width:60vw;
      max-height:60vw;
      border-radius:50%;
      background:transparent;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      opacity:1; /* Removed animation - always visible */
      position:relative;
      overflow:visible;
    }
    .logo{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform:scale(1.3);
      transform-origin:center center;
    }

    /* Exit animation applied to the logo container on click */
    .logo-exit {
      animation: logoExit 1.5s forwards ease-in-out;
    }

    @keyframes logoExit {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }

    /* Square frame that sits around the circular logo */
    .frame-square{
      width:256px;
      height:256px;
      max-width:66vw;
      max-height:66vw;
      display:flex;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
      background:transparent;
      border:8px solid #F26900;
      position:relative;
      border-radius:4px;
      cursor:pointer;
    }
    /* Full-screen transparent click area so user can tap anywhere */
    #splash-click-area {
      position:fixed;
      top:0;
      left:0;
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      cursor:pointer;
      z-index:2;
    }
    /* Top header removed — splash uses centered bottom logo only */
    .visually-hidden{
      position:absolute;
      left:-9999px;
    }
  </style>
</head>
<body aria-label="MaurMaket splash - click to enter">
  <!-- top header removed; only center splash logo remains -->
  <div id="splash-click-area">
    <div class="frame-square" aria-hidden="true">
      <div class="logo-container" id="splash-logo">
        <img src="https://i.ibb.co/3y6cPdkn/Logo-Without-name.png" alt="MaurMaket logo" class="logo">
      </div>
    </div>
  </div>
  <script>
    const area = document.getElementById("splash-click-area");
    const logo = document.getElementById("splash-logo");
    if (area && logo) {
      // Make sure clicking anywhere triggers the exit animation on the logo
      area.addEventListener("click", () => {
        // prevent further clicks
        area.style.pointerEvents = 'none';
        logo.style.pointerEvents = 'none';
        // animate only the logo container
        logo.classList.add("logo-exit");

        setTimeout(() => {
          window.location.href = "home.html";
        }, 1500);
      });
    }
  </script>
</body>
</html>
