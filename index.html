<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MaurMaket</title>
  <style>
    html,body{height:100%;margin:0;font-family:Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#f7f9fc,#ffffff);}
    .splash{height:100vh;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .logo{width:220px;max-width:60%;opacity:0;animation:fadeIn 900ms ease-in-out 200ms forwards}
    /* Top header logo - responsive and unobtrusive */
    .top-header{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:center;pointer-events:auto}
    .header-logo{height:48px;max-height:9vh;max-width:220px;width:auto;display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .visually-hidden{position:absolute;left:-9999px}
  </style>
</head>
<body onclick="window.location.href='home.html'" aria-label="MaurMaket splash - click to enter">
  <header class="top-header">
    <a href="home.html" aria-label="MaurMaket home">
      <svg class="header-logo" xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-hidden="false">
        <circle cx="48" cy="48" r="44" fill="#1e90ff"/>
        <text x="48" y="56" font-size="28" font-family="Segoe UI, Roboto, Arial, sans-serif" fill="white" text-anchor="middle">MM</text>
      </svg>
    </a>
  </header>
  <div class="splash">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 96 96" role="img" aria-hidden="false" onclick="window.location.href='home.html'">
      <circle cx="48" cy="48" r="44" fill="#1e90ff"/>
      <text x="48" y="56" font-size="28" font-family="Segoe UI, Roboto, Arial, sans-serif" fill="white" text-anchor="middle">MM</text>
    </svg>
  </div>
</body>
</html>
