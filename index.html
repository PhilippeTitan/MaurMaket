<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MaurMaket</title>
  <style>
    html,body{
      height:100%;
      margin:0;
      font-family:Segoe UI,Roboto,Arial,sans-serif;
      background:#F66C00;
    }
    .splash{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    /* Logo container - transparent, glow only */
    .logo-container{
      width:220px;
      height:220px;
      max-width:60vw;
      max-height:60vw;
      border-radius:50%;
      background:transparent; /* Transparent instead of white */
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      opacity:0;
      animation:fadeIn 900ms ease-in-out 200ms forwards;
      position:relative;
      overflow:visible; /* Allow glow to extend beyond bounds */
      filter:drop-shadow(0 0 30px rgba(246, 108, 0, 0.6)) 
             drop-shadow(0 0 60px rgba(246, 108, 0, 0.4));
    }
    /* Pulsing glow animation on container */
    .logo-container{
      animation:fadeIn 900ms ease-in-out 200ms forwards, 
                goldenGlow 3s ease-in-out 1.1s infinite;
    }
    .logo{
      width:100%;
      height:100%;
      object-fit:contain; /* Changed from cover to contain */
      display:block;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,0.2)); /* Subtle shadow on logo itself */
    }
    /* Top header logo - responsive and unobtrusive */
    .top-header{
      position:absolute;
      top:12px;
      left:0;
      right:0;
      display:flex;
      justify-content:center;
      pointer-events:auto;
      z-index:10;
    }
    .header-logo{
      height:48px;
      max-height:9vh;
      max-width:220px;
      width:auto;
      display:block;
      object-fit:contain;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }
    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(8px) scale(0.95);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }
    @keyframes goldenGlow{
      0%{
        filter:drop-shadow(0 0 30px rgba(246, 108, 0, 0.6)) 
               drop-shadow(0 0 60px rgba(246, 108, 0, 0.4));
      }
      50%{
        filter:drop-shadow(0 0 50px rgba(246, 108, 0, 0.9)) 
               drop-shadow(0 0 90px rgba(246, 108, 0, 0.6));
      }
      100%{
        filter:drop-shadow(0 0 30px rgba(246, 108, 0, 0.6)) 
               drop-shadow(0 0 60px rgba(246, 108, 0, 0.4));
      }
    }
    .visually-hidden{
      position:absolute;
      left:-9999px;
    }
  </style>
</head>
<body onclick="window.location.href='home.html'" aria-label="MaurMaket splash - click to enter">
  <header class="top-header">
    <a href="home.html" aria-label="MaurMaket home">
      <img src="https://i.ibb.co/6R94Z9Jd/Maur-Market-Logo-zoomed.png" alt="MaurMaket logo" class="header-logo">
    </a>
  </header>
  <div class="splash">
    <div class="logo-container" onclick="window.location.href='home.html'">
      <img src="https://i.ibb.co/6R94Z9Jd/Maur-Market-Logo-zoomed.png" alt="MaurMaket logo" class="logo">
    </div>
  </div>
</body>
</html>
